<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 皇后大挑戰 👑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background-color: #f0f9ff;
            background-image: radial-gradient(#bae6fd 2px, transparent 2px);
            background-size: 30px 30px;
        }
        
        .board-cell {
            transition: all 0.2s ease;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);
        }
        
        .board-cell:active {
            box-shadow: inset 0 0 0 rgba(0,0,0,0);
            transform: translateY(2px);
        }
        
        .queen-icon {
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.2));
            animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .conflict-cell {
            background-color: #fca5a5 !important;
            animation: shake 0.4s ease-in-out;
            box-shadow: inset 0 0 0 3px #ef4444, inset 0 -4px 0 rgba(0,0,0,0.1);
        }

        .hint-cell {
            background-color: #bbf7d0 !important;
            box-shadow: inset 0 0 0 3px #22c55e, inset 0 -4px 0 rgba(0,0,0,0.1);
            animation: pulse 1s infinite;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            75% { transform: translateX(-4px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Custom Scrollbar for Leaderboard */
        .custom-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="min-h-screen text-slate-700 py-6 px-4">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- Screen 1: Login -->
    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-blue-200 p-8 transform transition-all duration-500">
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">👑</div>
            <h1 class="text-3xl font-black text-blue-600 mb-2">皇后大挑戰</h1>
            <p class="text-slate-500 font-medium">歡迎來到邏輯與智慧的戰場！</p>
        </div>
        
        <div class="space-y-6">
            <div>
                <label for="nickname" class="block text-lg font-bold text-slate-700 mb-2">請輸入你的小名：</label>
                <input type="text" id="nickname" class="w-full px-4 py-3 rounded-xl border-2 border-blue-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none text-lg font-bold text-center transition-all" placeholder="例如：邏輯大師阿明">
            </div>
            
            <button onclick="app.login()" class="w-full bg-gradient-to-b from-blue-400 to-blue-600 text-white text-xl font-bold py-4 rounded-xl shadow-lg hover:shadow-xl hover:from-blue-500 hover:to-blue-700 transform hover:-translate-y-1 transition-all active:translate-y-1">
                開始挑戰 🚀
            </button>
        </div>
    </div>

    <!-- Screen 2: Main Game -->
    <div id="game-screen" class="hidden max-w-6xl mx-auto flex flex-col lg:flex-row gap-6 items-start">
        
        <!-- Left Column: Game Area -->
        <div class="w-full lg:w-2/3 bg-white p-4 sm:p-6 rounded-3xl shadow-xl border-4 border-yellow-200">
            <!-- Header Info -->
            <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-100 text-blue-700 px-4 py-2 rounded-xl font-bold text-lg flex items-center gap-2 border-2 border-blue-200">
                        <span>👤</span> <span id="display-name">玩家</span>
                    </div>
                    <div class="bg-slate-100 text-slate-700 px-4 py-2 rounded-xl font-bold text-lg flex items-center gap-2 border-2 border-slate-200">
                        <span>⏱️</span> <span id="display-time">00:00</span>
                    </div>
                </div>
                
                <div class="flex bg-slate-100 p-1 rounded-xl border-2 border-slate-200">
                    <button onclick="app.setLevel(4)" id="btn-lv4" class="px-4 py-2 rounded-lg font-bold transition-all text-emerald-600 hover:bg-white">入門 (4)</button>
                    <button onclick="app.setLevel(6)" id="btn-lv6" class="px-4 py-2 rounded-lg font-bold transition-all text-orange-500 hover:bg-white">挑戰 (6)</button>
                    <button onclick="app.setLevel(8)" id="btn-lv8" class="px-4 py-2 rounded-lg font-bold transition-all text-rose-600 hover:bg-white">地獄 (8)</button>
                </div>
            </div>

            <!-- Chessboard -->
            <div class="flex justify-center mb-6">
                <div id="chessboard" class="grid gap-1 bg-amber-800 p-2 rounded-xl shadow-inner border-4 border-amber-900 w-full max-w-md lg:max-w-xl aspect-square">
                    <!-- Board cells generated by JS -->
                </div>
            </div>

            <!-- Controls -->
            <div class="flex justify-center gap-4">
                <button onclick="app.showHint()" class="flex-1 max-w-[200px] bg-gradient-to-b from-green-400 to-green-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:shadow-xl hover:from-green-500 hover:to-green-700 transform hover:-translate-y-1 transition-all active:translate-y-1 flex justify-center items-center gap-2">
                    <span>💡</span> 給個提示
                </button>
                <button onclick="app.resetBoard()" class="flex-1 max-w-[200px] bg-gradient-to-b from-slate-400 to-slate-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:shadow-xl hover:from-slate-500 hover:to-slate-700 transform hover:-translate-y-1 transition-all active:translate-y-1 flex justify-center items-center gap-2">
                    <span>🔄</span> 重新開始
                </button>
            </div>
        </div>

        <!-- Right Column: Info & Leaderboard -->
        <div class="w-full lg:w-1/3 flex flex-col gap-6">
            
            <!-- Instructions Card -->
            <div class="bg-white p-6 rounded-3xl shadow-xl border-4 border-purple-200">
                <h2 class="text-2xl font-black text-purple-600 mb-4 flex items-center gap-2">
                    <span>📖</span> 遊戲規則
                </h2>
                <ul class="space-y-3 text-slate-600 font-medium leading-relaxed">
                    <li class="flex items-start gap-2">
                        <span class="text-purple-500 mt-1">1.</span>
                        <span>點擊格子即可放置或移除 <span class="text-xl">👑</span> 皇后。</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <span class="text-purple-500 mt-1">2.</span>
                        <span>皇后們的地盤意識很強，**不能**處在同一「列」、「行」或「對角線」上。</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <span class="text-purple-500 mt-1">3.</span>
                        <span>紅色格子代表皇后之間發生了衝突！</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <span class="text-purple-500 mt-1">4.</span>
                        <span>在不衝突的情況下，放滿對應數量的皇后（4、6或8）即過關。</span>
                    </li>
                </ul>
                <div class="mt-4 p-3 bg-purple-50 rounded-xl text-sm text-purple-700 border border-purple-100">
                    <span class="font-bold">🎓 數學小知識：</span> 經典的八皇后問題，在 8x8 棋盤上總共有 <strong>92</strong> 種不同的解答喔！試著找出一種吧！
                </div>
            </div>

            <!-- Leaderboard Card -->
            <div class="bg-white p-6 rounded-3xl shadow-xl border-4 border-pink-200 flex-1 flex flex-col min-h-[300px]">
                <h2 class="text-2xl font-black text-pink-600 mb-4 flex items-center gap-2">
                    <span>🏆</span> 英雄榜
                </h2>
                <div class="flex bg-pink-50 p-1 rounded-xl mb-4">
                    <button onclick="app.setLeaderboardView(4)" id="lb-tab-4" class="flex-1 py-1 rounded-lg font-bold text-sm text-pink-600 transition-all bg-white shadow">入門</button>
                    <button onclick="app.setLeaderboardView(6)" id="lb-tab-6" class="flex-1 py-1 rounded-lg font-bold text-sm text-pink-600 transition-all hover:bg-white hover:shadow">挑戰</button>
                    <button onclick="app.setLeaderboardView(8)" id="lb-tab-8" class="flex-1 py-1 rounded-lg font-bold text-sm text-pink-600 transition-all hover:bg-white hover:shadow">地獄</button>
                </div>
                
                <div class="flex-1 overflow-y-auto custom-scroll pr-2" id="leaderboard-list">
                    <!-- Leaderboard items generated by JS -->
                </div>
                
                <button onclick="app.logout()" class="mt-4 w-full text-slate-400 hover:text-slate-600 font-bold text-sm underline transition-colors">
                    切換玩家
                </button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-slate-900 bg-opacity-50 z-50 hidden flex justify-center items-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform scale-95 transition-transform duration-300" id="success-modal-content">
            <div class="text-7xl mb-4">🎉</div>
            <h2 class="text-3xl font-black text-emerald-500 mb-2">太厲害了！</h2>
            <p class="text-slate-600 font-bold mb-6 text-lg">
                你成功破解了 <span id="modal-level" class="text-emerald-500">8</span> 皇后！<br>
                耗時：<span id="modal-time" class="text-blue-500">00:00</span>
            </p>
            <div class="flex gap-3">
                <button onclick="app.closeModal(); app.resetBoard()" class="flex-1 bg-slate-200 text-slate-700 font-bold py-3 rounded-xl hover:bg-slate-300 transition-colors">
                    再玩一次
                </button>
                <button onclick="app.closeModal(); app.nextLevel()" id="btn-next-level" class="flex-1 bg-emerald-500 text-white font-bold py-3 rounded-xl hover:bg-emerald-600 shadow-lg transition-all transform hover:-translate-y-1">
                    下一關 👉
                </button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Storage Helper
         * Safely attempts to use localStorage, falls back to in-memory object if blocked (e.g. strict iframe)
         */
        const Storage = {
            memoryData: {},
            set(key, value) {
                try {
                    window.localStorage.setItem(key, JSON.stringify(value));
                } catch (e) {
                    this.memoryData[key] = value;
                }
            },
            get(key, defaultValue) {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : defaultValue;
                } catch (e) {
                    return this.memoryData[key] !== undefined ? this.memoryData[key] : defaultValue;
                }
            }
        };

        /**
         * Simple Web Audio Synthesizer for SFX without external assets
         */
        const AudioFX = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playTone(freq, type, duration, vol = 0.1) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },
            playSuccess() {
                this.init();
                this.playTone(523.25, 'sine', 0.1); // C5
                setTimeout(() => this.playTone(659.25, 'sine', 0.1), 100); // E5
                setTimeout(() => this.playTone(783.99, 'sine', 0.3), 200); // G5
            },
            playError() {
                this.init();
                this.playTone(150, 'sawtooth', 0.2, 0.05);
            },
            playPlace() {
                this.init();
                this.playTone(400, 'sine', 0.05, 0.05);
            },
            playRemove() {
                this.init();
                this.playTone(300, 'triangle', 0.05, 0.05);
            }
        };

        /**
         * Main Game Application
         */
        const app = {
            state: {
                username: '',
                level: 4, // 4, 6, 8
                queens: [], // Array of {r, c}
                startTime: null,
                timerId: null,
                timeElapsed: 0,
                isGameOver: false,
                hints: [], // Array of safe {r, c}
                leaderboardViewLevel: 4
            },

            // Color Themes for Different Board Sizes
            themes: {
                4: { light: 'bg-emerald-100', dark: 'bg-emerald-300', border: 'border-emerald-600', bg: 'bg-emerald-700' },
                6: { light: 'bg-orange-100', dark: 'bg-orange-300', border: 'border-orange-600', bg: 'bg-orange-700' },
                8: { light: 'bg-rose-100', dark: 'bg-rose-300', border: 'border-rose-700', bg: 'bg-rose-900' }
            },

            init() {
                // Check if already logged in previously
                const savedUser = Storage.get('eq_user', '');
                if (savedUser) {
                    document.getElementById('nickname').value = savedUser;
                }
            },

            showToast(msg, isError = false) {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `px-6 py-3 rounded-full text-white font-bold shadow-lg transform transition-all duration-300 translate-y-[-20px] opacity-0 ${isError ? 'bg-rose-500' : 'bg-slate-800'}`;
                toast.innerText = msg;
                container.appendChild(toast);
                
                // Animate in
                setTimeout(() => {
                    toast.classList.remove('translate-y-[-20px]', 'opacity-0');
                }, 10);

                // Animate out and remove
                setTimeout(() => {
                    toast.classList.add('translate-y-[-20px]', 'opacity-0');
                    setTimeout(() => toast.remove(), 300);
                }, 2500);
            },

            login() {
                const nameInput = document.getElementById('nickname').value.trim();
                if (!nameInput) {
                    this.showToast('請輸入一個帥氣的小名喔！', true);
                    return;
                }
                
                AudioFX.init(); // Initialize audio context on first user interaction
                
                this.state.username = nameInput;
                Storage.set('eq_user', nameInput);
                
                document.getElementById('display-name').innerText = nameInput;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                
                this.setLevel(4); // Default start at Level 1 (4 Queens)
            },

            logout() {
                this.stopTimer();
                Storage.set('eq_user', '');
                document.getElementById('nickname').value = '';
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
            },

            setLevel(n) {
                this.state.level = n;
                this.state.leaderboardViewLevel = n;
                
                // Update UI Buttons
                [4, 6, 8].forEach(lv => {
                    const btn = document.getElementById(`btn-lv${lv}`);
                    if (lv === n) {
                        btn.classList.add('bg-white', 'shadow-sm');
                    } else {
                        btn.classList.remove('bg-white', 'shadow-sm');
                    }
                });

                this.resetBoard();
                this.renderLeaderboard();
            },

            resetBoard() {
                this.state.queens = [];
                this.state.hints = [];
                this.state.isGameOver = false;
                this.stopTimer();
                this.state.timeElapsed = 0;
                this.updateTimerDisplay();
                this.buildBoardDOM();
                this.renderBoard();
            },

            buildBoardDOM() {
                const board = document.getElementById('chessboard');
                const n = this.state.level;
                const theme = this.themes[n];
                
                board.innerHTML = '';
                board.style.gridTemplateColumns = `repeat(${n}, minmax(0, 1fr))`;
                board.className = `grid gap-1 p-2 rounded-xl shadow-inner border-4 w-full max-w-md lg:max-w-xl aspect-square ${theme.bg} ${theme.border}`;

                for (let r = 0; r < n; r++) {
                    for (let c = 0; c < n; c++) {
                        const cell = document.createElement('button');
                        const isLight = (r + c) % 2 === 0;
                        cell.className = `board-cell relative w-full h-full flex justify-center items-center rounded-sm focus:outline-none ${isLight ? theme.light : theme.dark}`;
                        cell.dataset.r = r;
                        cell.dataset.c = c;
                        cell.onclick = () => this.handleCellClick(r, c);
                        board.appendChild(cell);
                    }
                }
            },

            handleCellClick(r, c) {
                if (this.state.isGameOver) return;

                // Start timer on first click
                if (this.state.timeElapsed === 0 && !this.state.timerId) {
                    this.startTimer();
                }

                const existingIndex = this.state.queens.findIndex(q => q.r === r && q.c === c);
                
                if (existingIndex >= 0) {
                    // Remove Queen
                    this.state.queens.splice(existingIndex, 1);
                    AudioFX.playRemove();
                } else {
                    // Check limit
                    if (this.state.queens.length >= this.state.level) {
                        this.showToast('只能放 ' + this.state.level + ' 個皇后喔！', true);
                        AudioFX.playError();
                        return;
                    }
                    // Add Queen
                    this.state.queens.push({ r, c });
                    AudioFX.playPlace();
                }

                this.state.hints = []; // Clear hints on interaction
                this.renderBoard();
                this.checkWinCondition();
            },

            getConflicts() {
                const conflicts = new Set();
                const q = this.state.queens;
                
                for (let i = 0; i < q.length; i++) {
                    for (let j = i + 1; j < q.length; j++) {
                        const q1 = q[i];
                        const q2 = q[j];
                        
                        // Same row, same col, or same diagonal
                        if (q1.r === q2.r || q1.c === q2.c || Math.abs(q1.r - q2.r) === Math.abs(q1.c - q2.c)) {
                            conflicts.add(`${q1.r},${q1.c}`);
                            conflicts.add(`${q2.r},${q2.c}`);
                        }
                    }
                }
                return Array.from(conflicts);
            },

            renderBoard() {
                const conflicts = this.getConflicts();
                if (conflicts.length > 0 && this.state.queens.length > 1) {
                    // Not playing error on every placement, just visual cue
                }

                const cells = document.querySelectorAll('.board-cell');
                cells.forEach(cell => {
                    const r = parseInt(cell.dataset.r);
                    const c = parseInt(cell.dataset.c);
                    
                    // Reset custom classes
                    cell.classList.remove('conflict-cell', 'hint-cell');
                    cell.innerHTML = ''; // Clear queen

                    // Check Hint
                    if (this.state.hints.some(h => h.r === r && h.c === c)) {
                        cell.classList.add('hint-cell');
                    }

                    // Check Queen
                    const hasQueen = this.state.queens.some(q => q.r === r && q.c === c);
                    if (hasQueen) {
                        // Dynamically adjust queen size based on level
                        let textSize = 'text-3xl sm:text-5xl';
                        if (this.state.level === 6) textSize = 'text-2xl sm:text-4xl';
                        if (this.state.level === 8) textSize = 'text-xl sm:text-3xl';

                        cell.innerHTML = `<span class="queen-icon select-none ${textSize}">👑</span>`;
                        
                        // Check Conflict
                        if (conflicts.includes(`${r},${c}`)) {
                            cell.classList.add('conflict-cell');
                        }
                    }
                });
            },

            showHint() {
                if (this.state.isGameOver) return;
                
                if (this.state.queens.length >= this.state.level) {
                    this.showToast('已經放滿皇后囉！', true);
                    return;
                }

                const safeSpots = [];
                const n = this.state.level;
                
                for (let r = 0; r < n; r++) {
                    for (let c = 0; c < n; c++) {
                        // If empty
                        if (!this.state.queens.some(q => q.r === r && q.c === c)) {
                            // Test adding it
                            const tempQueens = [...this.state.queens, {r, c}];
                            
                            // A pure function version of getConflicts for temp array
                            let hasConflict = false;
                            for (let i = 0; i < tempQueens.length; i++) {
                                for (let j = i + 1; j < tempQueens.length; j++) {
                                    let q1 = tempQueens[i]; let q2 = tempQueens[j];
                                    if (q1.r === q2.r || q1.c === q2.c || Math.abs(q1.r - q2.r) === Math.abs(q1.c - q2.c)) {
                                        hasConflict = true; break;
                                    }
                                }
                                if(hasConflict) break;
                            }
                            
                            if (!hasConflict) {
                                safeSpots.push({r, c});
                            }
                        }
                    }
                }

                if (safeSpots.length === 0) {
                    this.showToast('目前沒有安全的位置，請試著移動現有的皇后！', true);
                    AudioFX.playError();
                } else {
                    this.state.hints = safeSpots;
                    this.renderBoard();
                    
                    // Clear hints after 1.5s
                    setTimeout(() => {
                        this.state.hints = [];
                        this.renderBoard();
                    }, 1500);
                }
            },

            checkWinCondition() {
                const conflicts = this.getConflicts();
                if (this.state.queens.length === this.state.level && conflicts.length === 0) {
                    this.handleWin();
                }
            },

            handleWin() {
                this.state.isGameOver = true;
                this.stopTimer();
                AudioFX.playSuccess();
                
                // Save to leaderboard
                const record = {
                    name: this.state.username,
                    level: this.state.level,
                    time: this.state.timeElapsed,
                    date: new Date().getTime()
                };
                
                let lb = Storage.get('eq_leaderboard', []);
                lb.push(record);
                Storage.set('eq_leaderboard', lb);

                // 將記錄傳送至 Google 試算表 (新增此行)
                this.saveToGoogleSheets(record);
                
                // Show Modal
                document.getElementById('modal-level').innerText = this.state.level;
                document.getElementById('modal-time').innerText = this.formatTime(this.state.timeElapsed);
                
                const btnNext = document.getElementById('btn-next-level');
                if (this.state.level === 8) {
                    btnNext.classList.add('hidden'); // No next level after 8
                } else {
                    btnNext.classList.remove('hidden');
                }

                const modal = document.getElementById('success-modal');
                const modalContent = document.getElementById('success-modal-content');
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modalContent.classList.remove('scale-95');
                    modalContent.classList.add('scale-100');
                }, 10);

                this.renderLeaderboard();
            },

            // 新增發送資料到 Google 試算表的功能
            saveToGoogleSheets(record) {
                // ⚠️ 注意：請將下方的字串替換成你部署 GAS 後獲得的「網頁應用程式 URL」
                const gasUrl = 'https://script.google.com/macros/s/AKfycbw-mUDLzgRkMOTRfZFDVj_xC0HhpQj_OCl5WwFxdeeIU-3-_bOnCJr2J4e3jwi8EoNmRg/exec'; 
                
                if (!gasUrl) {
                    console.log('未設定 Google Apps Script URL，目前僅儲存於本地端。');
                    return;
                }

                // 準備要傳送的資料
                const payload = {
                    name: record.name,
                    level: record.level,
                    time: record.time,
                    formattedTime: this.formatTime(record.time)
                };

                // 透過背景發送請求，不影響玩家當下的過關體驗
                fetch(gasUrl, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    // 使用 text/plain 可以避免觸發瀏覽器複雜的 CORS 預檢請求
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        console.log('成功同步至 Google 試算表！');
                    }
                })
                .catch(err => console.error('同步至試算表失敗：', err));
            },

            closeModal() {
                const modal = document.getElementById('success-modal');
                const modalContent = document.getElementById('success-modal-content');
                modalContent.classList.remove('scale-100');
                modalContent.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            },

            nextLevel() {
                if (this.state.level === 4) this.setLevel(6);
                else if (this.state.level === 6) this.setLevel(8);
            },

            // Timer Logic
            startTimer() {
                this.state.startTime = Date.now();
                this.state.timerId = setInterval(() => {
                    this.state.timeElapsed = Math.floor((Date.now() - this.state.startTime) / 1000);
                    this.updateTimerDisplay();
                }, 1000);
            },

            stopTimer() {
                if (this.state.timerId) {
                    clearInterval(this.state.timerId);
                    this.state.timerId = null;
                }
            },

            formatTime(seconds) {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            },

            updateTimerDisplay() {
                document.getElementById('display-time').innerText = this.formatTime(this.state.timeElapsed);
            },

            // Leaderboard Logic
            setLeaderboardView(n) {
                this.state.leaderboardViewLevel = n;
                
                [4, 6, 8].forEach(lv => {
                    const tab = document.getElementById(`lb-tab-${lv}`);
                    if (lv === n) {
                        tab.classList.add('bg-white', 'shadow');
                        tab.classList.remove('hover:bg-white', 'hover:shadow');
                    } else {
                        tab.classList.remove('bg-white', 'shadow');
                        tab.classList.add('hover:bg-white', 'hover:shadow');
                    }
                });
                
                this.renderLeaderboard();
            },

            renderLeaderboard() {
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = '';
                
                const lb = Storage.get('eq_leaderboard', []);
                // Filter by view level, sort by time ASC
                const filtered = lb
                    .filter(r => r.level === this.state.leaderboardViewLevel)
                    .sort((a, b) => a.time - b.time);

                if (filtered.length === 0) {
                    list.innerHTML = `
                        <div class="text-center text-slate-400 font-bold py-8 flex flex-col items-center gap-2">
                            <span class="text-3xl">👻</span>
                            還沒有人挑戰成功，<br>成為第一名吧！
                        </div>`;
                    return;
                }

                filtered.forEach((record, index) => {
                    // Top 3 style differences
                    let medal = `<span class="w-6 font-bold text-slate-400">${index + 1}.</span>`;
                    let bgClass = "bg-white border-slate-100";
                    
                    if (index === 0) { medal = "🥇"; bgClass = "bg-yellow-50 border-yellow-200"; }
                    else if (index === 1) { medal = "🥈"; bgClass = "bg-slate-50 border-slate-200"; }
                    else if (index === 2) { medal = "🥉"; bgClass = "bg-orange-50 border-orange-200"; }

                    const el = document.createElement('div');
                    el.className = `flex justify-between items-center p-3 mb-2 rounded-xl border ${bgClass} shadow-sm`;
                    
                    // Highlight current user's record
                    const isMe = record.name === this.state.username;
                    const nameColor = isMe ? 'text-pink-600 font-black' : 'text-slate-600 font-bold';

                    el.innerHTML = `
                        <div class="flex items-center gap-2">
                            ${medal}
                            <span class="${nameColor} truncate max-w-[100px]" title="${record.name}">${record.name}</span>
                        </div>
                        <div class="font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded-md text-sm">
                            ${this.formatTime(record.time)}
                        </div>
                    `;
                    list.appendChild(el);
                });
            }
        };

        // Init on load
        window.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

        // Allow 'Enter' key to login
        document.getElementById('nickname').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                app.login();
            }
        });
    </script>
</body>
</html>
